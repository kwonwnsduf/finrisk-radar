spring:
  application:
    name: backend
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.finrisk.radar.collector.event,com.finrisk.radar.backtest.event,com.finrisk.radar.financial.event,com.finrisk.radar.risk.event,com.finrisk.radar.document.event
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

oauth:
  frontend-redirect-uri: ${OAUTH_FRONTEND_REDIRECT_URI:http://localhost:3000/login}
  code-ttl: ${OAUTH_CODE_TTL:180s}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:30m}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:14d}

app:
  seed-risk-scenarios:
    enabled: ${SEED_RISK_SCENARIOS_ENABLED:false}
  seed-reit-risk-scenarios:
    enabled: ${SEED_REIT_RISK_SCENARIOS_ENABLED:false}
  market-data:
    yahoo:
      base-url: ${YAHOO_FINANCE_BASE_URL:https://query1.finance.yahoo.com}
    s3:
      region: ${AWS_REGION:}
      access-key: ${AWS_ACCESS_KEY:}
      secret-key: ${AWS_SECRET_KEY:}
      bucket: ${AWS_S3_BUCKET:}
  dart:
    base-url: ${DART_BASE_URL:https://opendart.fss.or.kr}
    api-key: ${DART_API_KEY:}
  documents:
    naver:
      base-url: ${NAVER_NEWS_BASE_URL:https://naverapihub.apigw.ntruss.com}
      client-id: ${NAVER_CLIENT_ID:}
      client-secret: ${NAVER_CLIENT_SECRET:}
    scheduler:
      enabled: ${DOCUMENT_COLLECTION_SCHEDULER_ENABLED:false}
      cron: ${DOCUMENT_COLLECTION_SCHEDULER_CRON:0 0 * * * *}
    recalculation-retry-delay: ${DOCUMENT_RECALCULATION_RETRY_DELAY:60000}

management:
  prometheus:
    metrics:
      export:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,prometheus
  health:
    redis:
      enabled: false
    kafka:
      enabled: false
